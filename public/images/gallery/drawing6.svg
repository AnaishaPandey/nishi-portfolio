<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="catBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4EC"/>
      <stop offset="100%" stop-color="#FFF0F5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#catBg)"/>
  <!-- Decorative hearts background -->
  <path d="M50 60 C50 55 45 50 40 55 C35 50 30 55 30 60 C30 68 40 75 40 75 C40 75 50 68 50 60Z" fill="#FFB6C1" opacity="0.3"/>
  <path d="M370 80 C370 75 365 70 360 75 C355 70 350 75 350 80 C350 88 360 95 360 95 C360 95 370 88 370 80Z" fill="#FFB6C1" opacity="0.25"/>
  <path d="M340 320 C340 316 336 313 333 316 C330 313 326 316 326 320 C326 326 333 330 333 330 C333 330 340 326 340 320Z" fill="#CE93D8" opacity="0.25"/>
  <path d="M70 300 C70 296 66 293 63 296 C60 293 56 296 56 300 C56 306 63 310 63 310 C63 310 70 306 70 300Z" fill="#FFB6C1" opacity="0.3"/>
  <!-- Polka dots -->
  <circle cx="100" cy="50" r="8" fill="#FFB6C1" opacity="0.15"/>
  <circle cx="300" cy="40" r="6" fill="#CE93D8" opacity="0.15"/>
  <circle cx="200" cy="30" r="5" fill="#FFB6C1" opacity="0.1"/>
  <circle cx="50" cy="150" r="7" fill="#CE93D8" opacity="0.12"/>
  <circle cx="350" cy="200" r="6" fill="#FFB6C1" opacity="0.12"/>
  <!-- Cat body -->
  <ellipse cx="200" cy="280" rx="80" ry="60" fill="#FFE0B2"/>
  <!-- Cat head -->
  <circle cx="200" cy="180" r="65" fill="#FFE0B2"/>
  <!-- Ears -->
  <polygon points="150,135 140,80 175,120" fill="#FFE0B2"/>
  <polygon points="250,135 260,80 225,120" fill="#FFE0B2"/>
  <!-- Inner ears -->
  <polygon points="152,130 145,90 170,120" fill="#FFB6C1"/>
  <polygon points="248,130 255,90 230,120" fill="#FFB6C1"/>
  <!-- Eyes -->
  <ellipse cx="175" cy="175" rx="12" ry="14" fill="#333"/>
  <ellipse cx="225" cy="175" rx="12" ry="14" fill="#333"/>
  <!-- Eye shine -->
  <circle cx="180" cy="170" r="5" fill="white"/>
  <circle cx="230" cy="170" r="5" fill="white"/>
  <circle cx="173" cy="178" r="2.5" fill="white"/>
  <circle cx="223" cy="178" r="2.5" fill="white"/>
  <!-- Nose -->
  <path d="M195 195 L200 200 L205 195Z" fill="#FF69B4"/>
  <!-- Mouth -->
  <path d="M200 200 Q190 212 180 208" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M200 200 Q210 212 220 208" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="120" y1="188" x2="165" y2="195" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <line x1="118" y1="200" x2="165" y2="200" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <line x1="120" y1="212" x2="165" y2="205" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="188" x2="235" y2="195" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <line x1="282" y1="200" x2="235" y2="200" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="212" x2="235" y2="205" stroke="#333" stroke-width="1.5" opacity="0.5"/>
  <!-- Blush -->
  <ellipse cx="158" cy="200" rx="12" ry="8" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="242" cy="200" rx="12" ry="8" fill="#FFB6C1" opacity="0.5"/>
  <!-- Front paws -->
  <ellipse cx="160" cy="325" rx="25" ry="15" fill="#FFE0B2"/>
  <ellipse cx="240" cy="325" rx="25" ry="15" fill="#FFE0B2"/>
  <!-- Paw pads -->
  <ellipse cx="155" cy="328" rx="6" ry="4" fill="#FFB6C1"/>
  <circle cx="148" cy="322" r="3" fill="#FFB6C1"/>
  <circle cx="155" cy="320" r="3" fill="#FFB6C1"/>
  <circle cx="162" cy="322" r="3" fill="#FFB6C1"/>
  <ellipse cx="245" cy="328" rx="6" ry="4" fill="#FFB6C1"/>
  <circle cx="238" cy="322" r="3" fill="#FFB6C1"/>
  <circle cx="245" cy="320" r="3" fill="#FFB6C1"/>
  <circle cx="252" cy="322" r="3" fill="#FFB6C1"/>
  <!-- Tail -->
  <path d="M280 280 Q320 260 330 230 Q340 210 320 200" stroke="#FFE0B2" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Tail tip -->
  <circle cx="320" cy="200" r="10" fill="#FFE0B2"/>
  <!-- Bow on head -->
  <circle cx="230" cy="130" r="8" fill="#FF69B4"/>
  <path d="M230 130 Q250 110 260 130 Q250 125 230 130Z" fill="#FF69B4"/>
  <path d="M230 130 Q210 110 200 130 Q210 125 230 130Z" fill="#FF69B4"/>
  <circle cx="230" cy="130" r="4" fill="#FF1493"/>
  <!-- Sparkles around cat -->
  <polygon points="100,130 103,138 111,138 105,143 107,151 100,146 93,151 95,143 89,138 97,138" fill="#FFE66D" opacity="0.5" transform="scale(0.6) translate(50,150)"/>
  <polygon points="100,130 103,138 111,138 105,143 107,151 100,146 93,151 95,143 89,138 97,138" fill="#FFB6C1" opacity="0.5" transform="scale(0.5) translate(520,100)"/>
  <!-- Floor -->
  <ellipse cx="200" cy="360" rx="150" ry="20" fill="#FFB6C1" opacity="0.15"/>
  <!-- Title -->
  <text x="200" y="390" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="#FF69B4" font-weight="bold">Cute Animals</text>
</svg>