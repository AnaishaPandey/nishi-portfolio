<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="40%" stop-color="#FF9A56"/>
      <stop offset="70%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFF4BD"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="55%" r="30%">
      <stop offset="0%" stop-color="#FFE66D"/>
      <stop offset="60%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF9A56" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="400" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="200" cy="220" r="120" fill="url(#sunGlow)" opacity="0.6"/>
  <!-- Sun body -->
  <circle cx="200" cy="220" r="50" fill="#FFE66D"/>
  <!-- Cute sun face -->
  <circle cx="185" cy="212" r="5" fill="#FF9A56"/>
  <circle cx="215" cy="212" r="5" fill="#FF9A56"/>
  <path d="M185 228 Q200 240 215 228" stroke="#FF9A56" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="175" cy="225" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="225" cy="225" rx="8" ry="5" fill="#FFB6C1" opacity="0.6"/>
  <!-- Ground/hills -->
  <ellipse cx="100" cy="400" rx="200" ry="120" fill="#7CB342"/>
  <ellipse cx="320" cy="400" rx="180" ry="100" fill="#8BC34A"/>
  <ellipse cx="200" cy="410" rx="250" ry="80" fill="#689F38"/>
  <!-- Clouds -->
  <g opacity="0.7" fill="white">
    <ellipse cx="80" cy="80" rx="40" ry="20"/>
    <ellipse cx="60" cy="75" rx="25" ry="18"/>
    <ellipse cx="100" cy="78" rx="28" ry="16"/>
  </g>
  <g opacity="0.5" fill="white">
    <ellipse cx="310" cy="100" rx="35" ry="18"/>
    <ellipse cx="290" cy="96" rx="22" ry="15"/>
    <ellipse cx="330" cy="97" rx="24" ry="14"/>
  </g>
  <!-- Small birds -->
  <path d="M140 130 Q148 120 156 130" stroke="#FF6B9D" stroke-width="2" fill="none"/>
  <path d="M160 125 Q168 115 176 125" stroke="#FF6B9D" stroke-width="2" fill="none"/>
  <!-- Little flowers on hills -->
  <circle cx="80" cy="340" r="6" fill="#FF69B4"/>
  <circle cx="80" cy="340" r="3" fill="#FFE66D"/>
  <circle cx="150" cy="355" r="5" fill="#FF6B9D"/>
  <circle cx="150" cy="355" r="2.5" fill="#FFE66D"/>
  <circle cx="300" cy="345" r="6" fill="#FFB6C1"/>
  <circle cx="300" cy="345" r="3" fill="#FFE66D"/>
  <!-- Title -->
  <text x="200" y="385" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="white" font-weight="bold">Sunset Landscape</text>
</svg>