<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="spaceSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="50%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#2A1B3D"/>
    </linearGradient>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FF69B4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocketBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
  </defs>
  <!-- Space background -->
  <rect width="400" height="400" fill="url(#spaceSky)"/>
  <!-- Stars - various sizes -->
  <circle cx="30" cy="50" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="80" cy="30" r="1" fill="white" opacity="0.6"/>
  <circle cx="150" cy="60" r="2" fill="white" opacity="0.9"/>
  <circle cx="220" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="290" cy="45" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="370" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="40" cy="120" r="1" fill="white" opacity="0.5"/>
  <circle cx="110" cy="140" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="320" cy="150" r="1" fill="white" opacity="0.6"/>
  <circle cx="60" cy="200" r="2" fill="white" opacity="0.8"/>
  <circle cx="180" cy="180" r="1" fill="white" opacity="0.5"/>
  <circle cx="350" cy="220" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="20" cy="300" r="1" fill="white" opacity="0.6"/>
  <circle cx="100" cy="320" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="250" cy="300" r="1" fill="white" opacity="0.5"/>
  <circle cx="370" cy="340" r="2" fill="white" opacity="0.9"/>
  <circle cx="140" cy="370" r="1" fill="white" opacity="0.6"/>
  <circle cx="310" cy="370" r="1.5" fill="white" opacity="0.7"/>
  <!-- Twinkling stars (bigger) -->
  <polygon points="50,160 53,168 61,168 55,173 57,181 50,176 43,181 45,173 39,168 47,168" fill="#FFE66D" opacity="0.6" transform="scale(0.6) translate(30,230)"/>
  <polygon points="50,160 53,168 61,168 55,173 57,181 50,176 43,181 45,173 39,168 47,168" fill="#FFB6C1" opacity="0.5" transform="scale(0.5) translate(580,100)"/>
  <polygon points="50,160 53,168 61,168 55,173 57,181 50,176 43,181 45,173 39,168 47,168" fill="#87CEEB" opacity="0.6" transform="scale(0.5) translate(100,500)"/>
  <!-- Planet - pink/purple -->
  <circle cx="320" cy="120" r="40" fill="url(#planetGlow)" opacity="0.3"/>
  <circle cx="320" cy="120" r="30" fill="#CE93D8"/>
  <ellipse cx="320" cy="120" rx="45" ry="8" fill="none" stroke="#DDA0DD" stroke-width="3" opacity="0.6" transform="rotate(-20 320 120)"/>
  <!-- Cute face on planet -->
  <circle cx="312" cy="116" r="3" fill="#333"/>
  <circle cx="328" cy="116" r="3" fill="#333"/>
  <path d="M314 126 Q320 132 326 126" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="308" cy="124" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="332" cy="124" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
  <!-- Rocket -->
  <!-- Rocket body -->
  <rect x="175" y="160" width="50" height="100" rx="25" fill="url(#rocketBody)"/>
  <!-- Rocket nose -->
  <path d="M175 185 Q200 120 225 185" fill="#FF5252"/>
  <!-- Window -->
  <circle cx="200" cy="210" r="15" fill="#42A5F5"/>
  <circle cx="200" cy="210" r="12" fill="#64B5F6"/>
  <circle cx="196" cy="206" r="4" fill="white" opacity="0.5"/>
  <!-- Rocket fins -->
  <path d="M175 240 L155 275 L175 260Z" fill="#FF5252"/>
  <path d="M225 240 L245 275 L225 260Z" fill="#FF5252"/>
  <!-- Rocket flame -->
  <ellipse cx="200" cy="275" rx="15" ry="25" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="200" cy="280" rx="10" ry="20" fill="#FFE66D" opacity="0.9"/>
  <ellipse cx="200" cy="285" rx="5" ry="15" fill="white" opacity="0.7"/>
  <!-- Flame particles -->
  <circle cx="190" cy="305" r="3" fill="#FF9800" opacity="0.5"/>
  <circle cx="210" cy="310" r="2" fill="#FFE66D" opacity="0.4"/>
  <circle cx="200" cy="315" r="3" fill="#FF9800" opacity="0.3"/>
  <circle cx="195" cy="325" r="2" fill="#FFE66D" opacity="0.2"/>
  <!-- Moon -->
  <circle cx="80" cy="80" r="25" fill="#F5F5DC"/>
  <circle cx="72" cy="72" r="5" fill="#E0DCC0" opacity="0.5"/>
  <circle cx="90" cy="85" r="3" fill="#E0DCC0" opacity="0.4"/>
  <circle cx="78" cy="90" r="4" fill="#E0DCC0" opacity="0.3"/>
  <!-- Cute face on moon -->
  <circle cx="74" cy="78" r="2" fill="#333"/>
  <circle cx="86" cy="78" r="2" fill="#333"/>
  <path d="M76 86 Q80 90 84 86" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Shooting star -->
  <line x1="280" y1="30" x2="240" y2="60" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="280" y1="30" x2="310" y2="25" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="280" y1="30" x2="285" y2="15" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="280" cy="30" r="3" fill="white" opacity="0.8"/>
  <!-- Title -->
  <text x="200" y="380" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="white" font-weight="bold">Space Adventure</text>
</svg>