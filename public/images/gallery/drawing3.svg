<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="unicornSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5F5"/>
      <stop offset="100%" stop-color="#FFF0F5"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="17%" stop-color="#FF9A56"/>
      <stop offset="33%" stop-color="#FFE66D"/>
      <stop offset="50%" stop-color="#7CB342"/>
      <stop offset="67%" stop-color="#42A5F5"/>
      <stop offset="83%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#unicornSky)"/>
  <!-- Stars -->
  <polygon points="50,40 53,50 63,50 55,56 58,66 50,60 42,66 45,56 37,50 47,50" fill="#FFE66D" opacity="0.6"/>
  <polygon points="350,60 352,67 360,67 354,72 356,79 350,74 344,79 346,72 340,67 348,67" fill="#FFE66D" opacity="0.5"/>
  <polygon points="300,30 302,37 310,37 304,42 306,49 300,44 294,49 296,42 290,37 298,37" fill="#FFB6C1" opacity="0.5"/>
  <polygon points="100,80 102,85 108,85 103,89 105,94 100,90 95,94 97,89 92,85 98,85" fill="#CE93D8" opacity="0.5"/>
  <!-- Rainbow arc -->
  <path d="M40 350 Q200 80 360 350" stroke="url(#rainbow)" stroke-width="30" fill="none" opacity="0.5"/>
  <!-- Ground -->
  <ellipse cx="200" cy="420" rx="250" ry="80" fill="#C8E6C9"/>
  <!-- Unicorn body -->
  <ellipse cx="200" cy="280" rx="70" ry="45" fill="#E8D5F5"/>
  <!-- Legs -->
  <rect x="150" y="310" width="16" height="45" rx="8" fill="#DCC5EE"/>
  <rect x="175" y="315" width="16" height="45" rx="8" fill="#E8D5F5"/>
  <rect x="210" y="315" width="16" height="45" rx="8" fill="#E8D5F5"/>
  <rect x="235" y="310" width="16" height="45" rx="8" fill="#DCC5EE"/>
  <!-- Hooves -->
  <ellipse cx="158" cy="357" rx="10" ry="5" fill="#CE93D8"/>
  <ellipse cx="183" cy="362" rx="10" ry="5" fill="#CE93D8"/>
  <ellipse cx="218" cy="362" rx="10" ry="5" fill="#CE93D8"/>
  <ellipse cx="243" cy="357" rx="10" ry="5" fill="#CE93D8"/>
  <!-- Head -->
  <ellipse cx="280" cy="230" rx="40" ry="35" fill="#E8D5F5"/>
  <!-- Neck -->
  <ellipse cx="255" cy="255" rx="30" ry="30" fill="#E8D5F5"/>
  <!-- Ear -->
  <path d="M290 200 L300 175 L310 200" fill="#DCC5EE"/>
  <path d="M295 200 L300 182 L305 200" fill="#FFB6C1"/>
  <!-- Horn -->
  <path d="M295 185 L300 140 L305 185" fill="url(#horn)"/>
  <line x1="297" y1="175" x2="303" y2="175" stroke="#FFD93D" stroke-width="1" opacity="0.6"/>
  <line x1="296" y1="168" x2="304" y2="168" stroke="#FFD93D" stroke-width="1" opacity="0.6"/>
  <line x1="297" y1="161" x2="303" y2="161" stroke="#FFD93D" stroke-width="1" opacity="0.6"/>
  <line x1="298" y1="154" x2="302" y2="154" stroke="#FFD93D" stroke-width="1" opacity="0.6"/>
  <!-- Eye -->
  <circle cx="292" cy="225" r="6" fill="#333"/>
  <circle cx="294" cy="223" r="2" fill="white"/>
  <!-- Blush -->
  <ellipse cx="300" cy="238" rx="8" ry="5" fill="#FFB6C1" opacity="0.5"/>
  <!-- Smile -->
  <path d="M288 240 Q295 248 302 240" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Mane - rainbow colored -->
  <path d="M270 195 Q255 180 265 200" stroke="#FF6B6B" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M265 200 Q248 190 258 210" stroke="#FF9A56" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M258 210 Q242 205 252 225" stroke="#FFE66D" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M252 225 Q238 222 248 240" stroke="#7CB342" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M248 240 Q235 240 242 255" stroke="#42A5F5" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M242 255 Q232 258 238 270" stroke="#AB47BC" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Tail - rainbow -->
  <path d="M130 270 Q100 250 110 280 Q95 270 105 295 Q88 285 100 310" stroke="#FF6B6B" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M100 310 Q85 300 95 320" stroke="#FFE66D" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M95 320 Q82 315 90 335" stroke="#42A5F5" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Small hearts -->
  <path d="M60 150 C60 145 55 140 50 145 C45 140 40 145 40 150 C40 158 50 165 50 165 C50 165 60 158 60 150Z" fill="#FFB6C1" opacity="0.6"/>
  <path d="M340 300 C340 296 336 293 333 296 C330 293 326 296 326 300 C326 305 333 310 333 310 C333 310 340 305 340 300Z" fill="#FF69B4" opacity="0.5"/>
  <path d="M170 140 C170 137 167 135 165 137 C163 135 160 137 160 140 C160 144 165 147 165 147 C165 147 170 144 170 140Z" fill="#CE93D8" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="390" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="#AB47BC" font-weight="bold">Rainbow Unicorn</text>
</svg>