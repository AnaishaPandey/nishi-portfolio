<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="30%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#0288D1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </linearGradient>
  </defs>
  <!-- Ocean background -->
  <rect width="400" height="400" fill="url(#ocean)"/>
  <!-- Light rays from surface -->
  <polygon points="100,0 130,200 70,200" fill="white" opacity="0.05"/>
  <polygon points="200,0 220,250 180,250" fill="white" opacity="0.04"/>
  <polygon points="300,0 330,180 270,180" fill="white" opacity="0.05"/>
  <!-- Waves at top -->
  <path d="M0 100 Q50 80 100 100 Q150 120 200 100 Q250 80 300 100 Q350 120 400 100 L400 0 L0 0Z" fill="#87CEEB" opacity="0.5"/>
  <path d="M0 110 Q50 90 100 110 Q150 130 200 110 Q250 90 300 110 Q350 130 400 110 L400 0 L0 0Z" fill="#4FC3F7" opacity="0.3"/>
  <!-- Bubbles -->
  <circle cx="80" cy="200" r="6" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <circle cx="90" cy="180" r="4" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="75" cy="220" r="3" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="320" cy="250" r="5" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <circle cx="310" cy="230" r="3" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <circle cx="330" cy="270" r="4" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Fish 1 - Orange clownfish -->
  <ellipse cx="150" cy="200" rx="30" ry="18" fill="#FF9800"/>
  <path d="M120 200 L105 185 L105 215 Z" fill="#FF9800"/>
  <circle cx="165" cy="196" r="4" fill="white"/>
  <circle cx="167" cy="196" r="2.5" fill="#333"/>
  <path d="M140 195 L140 205" stroke="white" stroke-width="3"/>
  <path d="M155 193 L155 207" stroke="white" stroke-width="3"/>
  <!-- Smile -->
  <path d="M160 203 Q165 207 170 203" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Fish 2 - Blue cute fish -->
  <ellipse cx="280" cy="160" rx="25" ry="16" fill="#42A5F5"/>
  <path d="M255 160 L240 148 L240 172 Z" fill="#42A5F5"/>
  <circle cx="293" cy="156" r="4" fill="white"/>
  <circle cx="295" cy="156" r="2.5" fill="#333"/>
  <path d="M288 163 Q293 167 298 163" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Blush -->
  <ellipse cx="298" cy="164" rx="5" ry="3" fill="#FFB6C1" opacity="0.5"/>
  <!-- Fish 3 - Pink fish -->
  <ellipse cx="200" cy="290" rx="22" ry="14" fill="#FF69B4"/>
  <path d="M178 290 L165 280 L165 300 Z" fill="#FF69B4"/>
  <circle cx="212" cy="287" r="3" fill="white"/>
  <circle cx="213" cy="287" r="2" fill="#333"/>
  <path d="M208 294 Q212 297 216 294" stroke="#333" stroke-width="1.5" fill="none"/>
  <!-- Starfish -->
  <polygon points="100,330 105,318 115,325 112,312 125,312 115,305 120,292 108,298 100,288 92,298 80,292 85,305 75,312 88,312 85,325 95,318" fill="#FF8A65" opacity="0.8"/>
  <circle cx="100" cy="310" r="3" fill="#FFAB91"/>
  <!-- Seaweed -->
  <path d="M40 400 Q50 370 40 340 Q30 310 40 280" stroke="#4CAF50" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M55 400 Q65 375 55 350 Q45 325 55 300" stroke="#66BB6A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M350 400 Q360 365 350 330 Q340 300 350 270" stroke="#4CAF50" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M370 400 Q380 370 370 340 Q360 315 370 290" stroke="#81C784" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Coral -->
  <ellipse cx="300" cy="370" rx="25" ry="15" fill="#FF7043" opacity="0.7"/>
  <ellipse cx="290" cy="360" rx="12" ry="18" fill="#FF8A65" opacity="0.7"/>
  <ellipse cx="310" cy="358" rx="10" ry="16" fill="#FFAB91" opacity="0.7"/>
  <!-- Sand/ocean floor -->
  <ellipse cx="200" cy="420" rx="250" ry="40" fill="#FFE0B2" opacity="0.4"/>
  <!-- Jellyfish -->
  <ellipse cx="330" cy="120" rx="18" ry="12" fill="#CE93D8" opacity="0.6"/>
  <path d="M315 125 Q318 145 315 155" stroke="#CE93D8" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M325 128 Q325 150 322 160" stroke="#CE93D8" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M335 128 Q335 150 338 160" stroke="#CE93D8" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M345 125 Q342 145 345 155" stroke="#CE93D8" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="390" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="white" font-weight="bold">Ocean World</text>
</svg>