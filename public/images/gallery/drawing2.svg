<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="gardenSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B8E6FF"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="400" fill="url(#gardenSky)"/>
  <!-- Ground -->
  <ellipse cx="200" cy="420" rx="280" ry="140" fill="#7CB342"/>
  <ellipse cx="200" cy="430" rx="250" ry="120" fill="#8BC34A"/>
  <!-- Cute sun -->
  <circle cx="340" cy="60" r="35" fill="#FFE66D"/>
  <circle cx="330" cy="55" r="4" fill="#FF9A56"/>
  <circle cx="350" cy="55" r="4" fill="#FF9A56"/>
  <path d="M332 65 Q340 73 348 65" stroke="#FF9A56" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Sun rays -->
  <line x1="340" y1="20" x2="340" y2="10" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="35" x2="380" y2="30" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
  <line x1="375" y1="60" x2="385" y2="60" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="35" x2="300" y2="30" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
  <line x1="305" y1="60" x2="295" y2="60" stroke="#FFE66D" stroke-width="3" stroke-linecap="round"/>
  <!-- Flower 1 - Pink tulip -->
  <line x1="80" y1="320" x2="80" y2="240" stroke="#4CAF50" stroke-width="4"/>
  <path d="M65 250 Q80 220 95 250 Q80 260 65 250Z" fill="#FF69B4"/>
  <ellipse cx="60" cy="290" rx="20" ry="8" fill="#66BB6A" transform="rotate(-30 60 290)"/>
  <!-- Flower 2 - Red daisy -->
  <line x1="160" y1="330" x2="160" y2="230" stroke="#4CAF50" stroke-width="4"/>
  <circle cx="160" cy="220" r="12" fill="#FFE66D"/>
  <ellipse cx="160" cy="200" rx="8" ry="12" fill="#FF5252"/>
  <ellipse cx="160" cy="240" rx="8" ry="12" fill="#FF5252"/>
  <ellipse cx="140" cy="220" rx="12" ry="8" fill="#FF5252"/>
  <ellipse cx="180" cy="220" rx="12" ry="8" fill="#FF5252"/>
  <ellipse cx="146" cy="206" rx="8" ry="12" fill="#FF5252" transform="rotate(45 146 206)"/>
  <ellipse cx="174" cy="206" rx="8" ry="12" fill="#FF5252" transform="rotate(-45 174 206)"/>
  <ellipse cx="146" cy="234" rx="8" ry="12" fill="#FF5252" transform="rotate(-45 146 234)"/>
  <ellipse cx="174" cy="234" rx="8" ry="12" fill="#FF5252" transform="rotate(45 174 234)"/>
  <circle cx="160" cy="220" r="10" fill="#FFE66D"/>
  <!-- Flower 3 - Purple -->
  <line x1="240" y1="310" x2="240" y2="220" stroke="#4CAF50" stroke-width="4"/>
  <circle cx="240" cy="210" r="10" fill="#FFE66D"/>
  <circle cx="240" cy="195" r="10" fill="#CE93D8"/>
  <circle cx="240" cy="225" r="10" fill="#CE93D8"/>
  <circle cx="225" cy="210" r="10" fill="#CE93D8"/>
  <circle cx="255" cy="210" r="10" fill="#CE93D8"/>
  <circle cx="240" cy="210" r="8" fill="#FFE66D"/>
  <ellipse cx="255" cy="270" rx="18" ry="7" fill="#66BB6A" transform="rotate(20 255 270)"/>
  <!-- Flower 4 - Orange -->
  <line x1="320" y1="325" x2="320" y2="250" stroke="#4CAF50" stroke-width="4"/>
  <path d="M305 260 Q320 230 335 260 Q320 270 305 260Z" fill="#FF9800"/>
  <path d="M305 260 Q320 230 335 260" fill="#FFB74D"/>
  <!-- Small flowers in grass -->
  <circle cx="50" cy="350" r="5" fill="#FFB6C1"/>
  <circle cx="50" cy="350" r="2" fill="#FFE66D"/>
  <circle cx="130" cy="360" r="4" fill="#FF69B4"/>
  <circle cx="130" cy="360" r="2" fill="white"/>
  <circle cx="200" cy="355" r="5" fill="#E1BEE7"/>
  <circle cx="200" cy="355" r="2" fill="#FFE66D"/>
  <circle cx="280" cy="350" r="4" fill="#FF8A80"/>
  <circle cx="280" cy="350" r="2" fill="white"/>
  <circle cx="350" cy="355" r="5" fill="#FFB6C1"/>
  <circle cx="350" cy="355" r="2" fill="#FFE66D"/>
  <!-- Butterfly -->
  <ellipse cx="120" cy="170" rx="15" ry="10" fill="#E1BEE7" opacity="0.8" transform="rotate(-20 120 170)"/>
  <ellipse cx="140" cy="170" rx="15" ry="10" fill="#FFB6C1" opacity="0.8" transform="rotate(20 140 170)"/>
  <ellipse cx="123" cy="180" rx="10" ry="7" fill="#CE93D8" opacity="0.8" transform="rotate(-20 123 180)"/>
  <ellipse cx="137" cy="180" rx="10" ry="7" fill="#FF8A80" opacity="0.8" transform="rotate(20 137 180)"/>
  <line x1="130" y1="165" x2="130" y2="190" stroke="#666" stroke-width="1.5"/>
  <!-- Cloud -->
  <g opacity="0.8" fill="white">
    <ellipse cx="80" cy="60" rx="35" ry="18"/>
    <ellipse cx="55" cy="55" rx="25" ry="16"/>
    <ellipse cx="100" cy="57" rx="22" ry="14"/>
  </g>
  <!-- Title -->
  <text x="200" y="390" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="#4CAF50" font-weight="bold">Flower Garden</text>
</svg>